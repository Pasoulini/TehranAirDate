[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
Blur=20
OnUpdateAction=[!UpdateMeter MeterPM10Value][!UpdateMeter MeterPM10Status][!UpdateMeter MeterJalaliDate][!Redraw]

[Metadata]
Name=TehranAirDate
Author=Parsa Rasouli
Information=Tehran air quality (AQI) and Jalali date widget. Data from time.now
Version=1.1
License=MIT

[Variables]
FontMain=Segoe UI
FontBold=Segoe UI Semibold
Text=245,247,250,255
Muted=190,200,214,255
Accent=86,182,255,255
Good=80,220,120,255
Fair=150,220,95,255
Moderate=255,198,74,255
Poor=255,133,72,255
VeryPoor=255,82,82,255
Hazardous=150,0,180,255
TextStroke=0,0,0,180
AQIStatus=Loading
AQIColor=#Muted#
AirUrl=https://time.now/tehran/aqi/
ToolTipTitle=Tehran Air Quality

; -------------------------
; DATA
; -------------------------

[MeasureAirData]
Measure=Plugin
Plugin=WebParser.dll
Url=#AirUrl#
UpdateRate=3600
Download=1
RegExp=(?si).*AQI\s+in\s+Tehran\s+is\s+([0-9]{1,3}).*
Debug=0
Log=0
ErrorString=--
FinishAction=[!UpdateMeter MeterPM10Value][!UpdateMeter MeterPM10Status][!Redraw]

[MeasureAQI]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureAirData]
StringIndex=1
IfCondition=(MeasureAQI <= 50)
IfTrueAction=[!SetVariable AQIStatus "Good"][!SetVariable AQIColor "#Good#"][!SetOption MeterPM10Status ToolTipText "Air quality is satisfactory"][!UpdateMeter MeterPM10Status][!Redraw]
IfCondition2=(MeasureAQI > 50) && (MeasureAQI <= 100)
IfTrueAction2=[!SetVariable AQIStatus "Moderate"][!SetVariable AQIColor "#Moderate#"][!SetOption MeterPM10Status ToolTipText "Sensitive groups should limit outdoor exertion"][!UpdateMeter MeterPM10Status][!Redraw]
IfCondition3=(MeasureAQI > 100) && (MeasureAQI <= 150)
IfTrueAction3=[!SetVariable AQIStatus "Unhealthy (Sensitive)"][!SetVariable AQIColor "#Poor#"][!SetOption MeterPM10Status ToolTipText "Members of sensitive groups may experience health effects"][!UpdateMeter MeterPM10Status][!Redraw]
IfCondition4=(MeasureAQI > 150) && (MeasureAQI <= 200)
IfTrueAction4=[!SetVariable AQIStatus "Unhealthy"][!SetVariable AQIColor "#VeryPoor#"][!SetOption MeterPM10Status ToolTipText "Everyone may begin to experience health effects"][!UpdateMeter MeterPM10Status][!Redraw]
IfCondition5=(MeasureAQI > 200)
IfTrueAction5=[!SetVariable AQIStatus "Very Unhealthy"][!SetVariable AQIColor "#Hazardous#"][!SetOption MeterPM10Status ToolTipText "Health warnings of emergency conditions"][!UpdateMeter MeterPM10Status][!Redraw]
IfBelowMode=0
DynamicVariables=1

[MeasureJalaliDate]
Measure=Script
ScriptFile=#@#JalaliDate.lua
UpdateDivider=60

; -------------------------
; METERS
; -------------------------

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,280,104,16 | Fill Color 18,22,36,220 | StrokeWidth 1 | Stroke Color 40,50,70,100
MouseOverAction=[!SetOption #CURRENTSECTION# StrokeColor 86,182,255,150][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# StrokeColor 40,50,70,100][!UpdateMeter #CURRENTSECTION#][!Redraw]
DynamicVariables=1

[MeterPM10Label]
Meter=String
X=18
Y=12
FontFace=#FontBold#
FontSize=12
FontColor=#Muted#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=AIR QUALITY
Uppercase=1

[MeterPM10Value]
Meter=String
MeasureName=MeasureAQI
X=18
Y=30
W=130
H=34
StringAlign=Left
FontFace=#FontBold#
FontSize=24
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=%1
DynamicVariables=1
ToolTipTitle=#ToolTipTitle#
ToolTipText=Tehran AQI: %1

[MeterAQIUnit]
Meter=String
X=18
Y=64
FontFace=#FontMain#
FontSize=9
FontColor=#Muted#
AntiAlias=1
Text=AQI (US EPA Standard)

[MeterPM10Status]
Meter=String
X=262
Y=12
W=150
H=20
StringAlign=Right
FontFace=#FontBold#
FontSize=11
FontColor=#AQIColor#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
ClipString=1
DynamicVariables=1
Text=#AQIStatus#

[MeterStatusDot]
Meter=Shape
Shape=Ellipse 262,40,4,4 | Fill Color #AQIColor# | StrokeWidth 0
DynamicVariables=1

[MeterDivider]
Meter=Shape
Shape=Rectangle 18,76,244,1,0 | Fill Color 60,70,90,120 | StrokeWidth 0

[MeterJalaliDate]
Meter=String
MeasureName=MeasureJalaliDate
X=18
Y=86
W=244
H=20
StringAlign=Left
FontFace=#FontBold#
FontSize=14
FontColor=#Accent#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
ClipString=1
Text=%1

[MeterRefreshHitbox]
Meter=Shape
Shape=Rectangle 0,0,280,104,16 | Fill Color 0,0,0,0 | StrokeWidth 0
LeftMouseUpAction=[!Refresh]
ToolTipText=Click to refresh
MouseOverAction=[!SetOption #CURRENTSECTION# ToolTipText "Refreshing..."][!UpdateMeter #CURRENTSECTION#][!CommandMeasure MeasureAirData "Update"]
MouseLeaveAction=[!SetOption #CURRENTSECTION# ToolTipText "Click to refresh"][!UpdateMeter #CURRENTSECTION#]
