[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

[Metadata]
Name=TehranAirDate
Author=ChatGPT
Information=Tehran air quality (AQI) and Jalali date widget. Data from time.now
Version=1.0

[Variables]
FontMain=Segoe UI
FontBold=Segoe UI Semibold
Text=245,247,250,255
Muted=190,200,214,255
Accent=86,182,255,255
Good=80,220,120,255
Fair=150,220,95,255
Moderate=255,198,74,255
Poor=255,133,72,255
VeryPoor=255,82,82,255
TextStroke=0,0,0,180
AQIStatus=Loading
AQIColor=#Muted#
AirUrl=https://time.now/tehran/aqi/

; -------------------------
; DATA
; -------------------------

[MeasureAirData]
Measure=Plugin
Plugin=WebParser.dll
Url=#AirUrl#
UpdateRate=3600
RegExp=(?si).*AQI\s+in\s+Tehran\s+is\s+([0-9]{1,3}).*
Debug=1
ErrorString=Air data unavailable

[MeasureAQI]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureAirData]
StringIndex=1
IfCondition=(MeasureAQI <= 50)
IfTrueAction=[!SetVariable AQIStatus "Good"][!SetVariable AQIColor "#Good#"][!UpdateMeter MeterPM10Status][!Redraw]
IfCondition2=(MeasureAQI > 50) && (MeasureAQI <= 100)
IfTrueAction2=[!SetVariable AQIStatus "Moderate"][!SetVariable AQIColor "#Moderate#"][!UpdateMeter MeterPM10Status][!Redraw]
IfCondition3=(MeasureAQI > 100) && (MeasureAQI <= 150)
IfTrueAction3=[!SetVariable AQIStatus "Unhealthy"][!SetVariable AQIColor "#Poor#"][!UpdateMeter MeterPM10Status][!Redraw]
IfCondition4=(MeasureAQI > 150)
IfTrueAction4=[!SetVariable AQIStatus "Very unhealthy"][!SetVariable AQIColor "#VeryPoor#"][!UpdateMeter MeterPM10Status][!Redraw]

[MeasureJalaliDate]
Measure=Script
ScriptFile=#@#JalaliDate.lua
UpdateDivider=60

; -------------------------
; METERS
; -------------------------

[MeterPM10Label]
Meter=String
X=18
Y=0
FontFace=#FontBold#
FontSize=13
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=Air Quality

[MeterPM10Value]
Meter=String
MeasureName=MeasureAQI
X=18
Y=19
W=130
H=30
StringAlign=Left
FontFace=#FontBold#
FontSize=22
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=%1 AQI

[MeterPM10Status]
Meter=String
X=262
Y=0
W=150
H=18
StringAlign=Right
FontFace=#FontBold#
FontSize=10
FontColor=#AQIColor#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
ClipString=1
DynamicVariables=1
Text=#AQIStatus#

[MeterJalaliDate]
Meter=String
MeasureName=MeasureJalaliDate
X=18
Y=50
W=280
H=36
StringAlign=Left
FontFace=#FontBold#
FontSize=22
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
ClipString=1
Text=%1

[MeterRefreshHitbox]
Meter=Shape
Shape=Rectangle 0,0,280,104,16 | Fill Color 0,0,0,0 | StrokeWidth 0
LeftMouseUpAction=[!Refresh]
ToolTipText=Click to refresh air quality (Tehran) and Jalali date
