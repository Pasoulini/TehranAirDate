[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

[Metadata]
Name=TehranAirDate
Author=Parsa Rasouli
Information=Tehran air quality (AQI) and Jalali date widget.
Version=1.3
License=MIT

[Variables]
FontMain=Segoe UI
FontBold=Segoe UI Semibold
Text=245,247,250,255
Muted=190,200,214,255
Accent=86,182,255,255
Good=80,220,120,255
Fair=150,220,95,255
Moderate=255,198,74,255
Poor=255,133,72,255
VeryPoor=255,82,82,255
TextStroke=0,0,0,180
AQIStatus=Loading
AQIColor=#Muted#
AirUrl=https://air-quality-api.open-meteo.com/v1/air-quality?latitude=35.6892&longitude=51.3890&current=us_aqi,pm10,pm2_5

; -------------------------
; DATA
; -------------------------

[MeasureAirData]
Measure=Plugin
Plugin=WebParser.dll
Url=#AirUrl#
UpdateRate=3600
Download=1
RegExp=(?siU)"current":\{"time":"[^"]*","interval":[0-9]+,"us_aqi":([0-9]+),"pm10":([0-9.]+),"pm2_5":([0-9.]+)\}
Debug=0
ErrorString=--

[MeasureAQI]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureAirData]
StringIndex=1

[MeasurePM10]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureAirData]
StringIndex=2

[MeasurePM25]
Measure=Plugin
Plugin=WebParser.dll
Url=[MeasureAirData]
StringIndex=3

[MeasureJalaliDate]
Measure=Script
ScriptFile=#@#JalaliDate.lua
UpdateDivider=60

[MeasureAQIStatus]
Measure=Calc
Formula=MeasureAQI
IfCondition=(MeasureAQIStatus <= 50)
IfTrueAction=[!SetVariable AQIStatus "Good"][!SetVariable AQIColor "#Good#"]
IfCondition2=(MeasureAQIStatus > 50) && (MeasureAQIStatus <= 100)
IfTrueAction2=[!SetVariable AQIStatus "Moderate"][!SetVariable AQIColor "#Moderate#"]
IfCondition3=(MeasureAQIStatus > 100) && (MeasureAQIStatus <= 150)
IfTrueAction3=[!SetVariable AQIStatus "Unhealthy"][!SetVariable AQIColor "#Poor#"]
IfCondition4=(MeasureAQIStatus > 150)
IfTrueAction4=[!SetVariable AQIStatus "Very Unhealthy"][!SetVariable AQIColor "#VeryPoor#"]
DynamicVariables=1

; -------------------------
; METERS
; -------------------------

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,280,104,16 | Fill Color 18,22,36,220 | StrokeWidth 1 | Stroke Color 40,50,70,100

[MeterAQILabel]
Meter=String
X=18
Y=12
FontFace=#FontBold#
FontSize=12
FontColor=#Muted#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=AIR QUALITY

[MeterAQIValue]
Meter=String
MeasureName=MeasureAQI
X=18
Y=30
W=130
H=34
StringAlign=Left
FontFace=#FontBold#
FontSize=24
FontColor=#Text#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
Text=%1 AQI

[MeterAQIUnit]
Meter=String
X=18
Y=64
FontFace=#FontMain#
FontSize=9
FontColor=#Muted#
AntiAlias=1
Text=US EPA Standard

[MeterAQIStatus]
Meter=String
X=262
Y=12
W=150
H=20
StringAlign=Right
FontFace=#FontBold#
FontSize=11
FontColor=#AQIColor#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
ClipString=1
DynamicVariables=1
Text=#AQIStatus#

[MeterDivider]
Meter=Shape
Shape=Rectangle 18,76,244,1,0 | Fill Color 60,70,90,120 | StrokeWidth 0

[MeterJalaliDate]
Meter=String
MeasureName=MeasureJalaliDate
X=18
Y=86
W=244
H=20
StringAlign=Left
FontFace=#FontBold#
FontSize=14
FontColor=#Accent#
StringEffect=Shadow
FontEffectColor=#TextStroke#
AntiAlias=1
ClipString=1
Text=%1

[MeterRefreshHitbox]
Meter=Shape
Shape=Rectangle 0,0,280,104,16 | Fill Color 0,0,0,0 | StrokeWidth 0
LeftMouseUpAction=[!Refresh]
ToolTipText=Click to refresh
